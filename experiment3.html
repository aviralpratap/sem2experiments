<!DOCTYPE html>
<html lang="en">
<head>
    <title>JavaScript Lab</title>
    <link rel="stylesheet" href="Experiment3.css">
</head>

<div class="container">
    <h2 id="heading">Welcome to JavaScript Lab</h2>

<script src="Experiment3.js"></script>
